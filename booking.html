<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحجز | Vision Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
<div class="container">

<div class="logo">VISION ACADEMY</div>

<nav>
<ul>
<li><a href="index.html">الرئيسية</a></li>
<li><a href="courses.html">الدورات</a></li>
<li><a href="pricing.html">الأسعار</a></li>
<li><a class="active" href="booking.html">الحجز</a></li>
<li><a href="contact.html">تواصل</a></li>
</ul>
</nav>

</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="container">
<h1>احجز دورتك الآن</h1>
<p>املأ البيانات وسيتم التواصل معك مباشرة عبر واتساب</p>
</div>
</section>

<!-- FORM -->
<section>

<div class="container">

<div class="course-card">

<h2>📌 نموذج الحجز</h2>

<input id="name" placeholder="الاسم الكامل" style="width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #e2e8f0;">

<input id="phone" placeholder="رقم الهاتف" style="width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #e2e8f0;">

<select id="course" style="width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #e2e8f0;">
<option value="">اختر الدورة</option>
<option>اللغة الإنجليزية</option>
<option>اللغة الفرنسية</option>
<option>اللغة الألمانية</option>
<option>تحفيظ القرآن</option>
<option>الإحسان وبناء اليقين</option>
</select>

<input id="time" placeholder="الوقت المناسب (مثال: 6 مساءً)" style="width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #e2e8f0;">

<textarea id="notes" placeholder="ملاحظات إضافية" style="width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #e2e8f0;min-height:100px;"></textarea>

<button class="course-btn" onclick="sendBooking()">
<i class="fa-brands fa-whatsapp"></i> إرسال الحجز عبر واتساب
</button>

</div>

</div>

</section>

<!-- FOOTER -->
<footer class="footer">
© 2026 Vision Academy
</footer>

<!-- SCRIPT -->
<script>
function sendBooking(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let course = document.getElementById("course").value;
let time = document.getElementById("time").value;
let notes = document.getElementById("notes").value;

if(!name || !phone || !course){
alert("يرجى إدخال الاسم + الهاتف + الدورة");
return;
}

let message =
`🎓 حجز جديد - Vision Academy
👤 الاسم: ${name}
📞 الهاتف: ${phone}
📚 الدورة: ${course}
⏰ الوقت: ${time}
📝 ملاحظات: ${notes}`;

let url = "https://wa.me/967700000000?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}
</script>

</body>
</html>
